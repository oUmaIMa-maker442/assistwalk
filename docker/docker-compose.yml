version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: assistwalk-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-assistwalk}
      POSTGRES_USER: ${POSTGRES_USER:-assistwalk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-assistwalk_user} -d ${POSTGRES_DB:-assistwalk}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: