services:
  postgres:
    image: postgres:16-alpine
    container_name: assistwalk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: assistwalk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ocr-service:
    build:
      context: ../ocr
      dockerfile: Dockerfile
    container_name: assistwalk-ocr
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../ocr/.env

volumes:
  postgres_data: