server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Frontend React ──────────────────────────────────
    location / {
        proxy_pass http://web:80;
    }

    # ── Spring Boot : API ───────────────────────────────
    location /api/ {
        proxy_pass http://backend:8081/api/;
    }

    # ── Spring Boot : Auth ──────────────────────────────
    location /auth/ {
        proxy_pass http://backend:8081/auth/;
    }

    # ── Spring Boot : fichiers uploades ─────────────────
    location /uploads/ {
        proxy_pass http://backend:8081/uploads/;
    }

    # ── Spring Boot : WebSocket STOMP ───────────────────
    location /ws {
        proxy_pass http://backend:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Flask navigation ─────────────────────────────────
    location /navigation/ {
        proxy_pass http://backend-navigation:5001/navigation/;
    }

    # ── OCR FastAPI (prefixe /ocr/ retire) ──────────────
    location /ocr/ {
        proxy_pass http://ocr-service:8000/;
    }
}
