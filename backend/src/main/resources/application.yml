spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/assistwalk}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: oumaimalahkiar18@gmail.com
    password: facktygoebacactr
    properties:
      mail:
        smtp:

          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8081
  address: 0.0.0.0

jwt:
  secret: ${JWT_SECRET:dev-secret-insecure-change-in-prod}
  expiration-ms: ${JWT_EXPIRATION_MS:28800000}                    # 8 heures
  expiration-remember-ms: ${JWT_EXPIRATION_REMEMBER_MS:2592000000} # 30 jours

logging:
  level:
    com.assistwalk: DEBUG

ocr:
  service:
    url: ${OCR_SERVICE_URL:http://localhost:8000}

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  upload:
    dir: ${UPLOAD_DIR:uploads/profiles}